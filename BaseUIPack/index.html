<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Base UI Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Wallpaper -->
  <div id="wallpaper"></div>

  <!-- Homescreen -->
  <div id="homescreen">
    <div id="homescreen-grid"></div>
  </div>

  <!-- Dock (optional) -->
  <div id="dock"></div>

  <!-- Swipe-up App Drawer -->
  <div id="drawer">
    <div id="drawer-handle"></div>
    <div id="drawer-list"></div>
  </div>

  <!-- Simple wallpaper picker -->
  <div id="wallpaper-picker">
    <img src="assets/wallpaper_1.jpg" data-wallpaper="assets/wallpaper_1.jpg">
    <img src="assets/wallpaper_2.jpg" data-wallpaper="assets/wallpaper_2.jpg">
  </div>

  <script src="api.js"></script>
  <script src="gestures.js"></script>
  <script src="launcher.js"></script>
</body>
</html>
